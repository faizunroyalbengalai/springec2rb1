---
- name: Deploy springec2rb1
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_port: 8080
    project: 'springec2rb1'
    web_server: 'nginx'
    java_version: '21'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Java runtime ──────────────────────────────────────────────────────────
    - name: Install Java {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jre-headless"
        state: present

    - name: Install Java {{ java_version }} JDK
      apt:
        name: "openjdk-{{ java_version }}-jdk-headless"
        state: present

    # ── Local database installation ───────────────────────────────────────────
    - name: Install PostgreSQL server
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: 5432
        host: 127.0.0.1
        timeout: 60

    - name: Create PostgreSQL database and user
      shell: |
        DB_NAME="{{ lookup('env', 'DB_NAME') | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ lookup('env', 'DB_USERNAME') | default('appuser', true) }}"
        DB_PASS="{{ lookup('env', 'DB_PASSWORD') | default('apppass', true) }}"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE DATABASE \"$DB_NAME\";"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"
        sudo -u postgres psql -c "ALTER DATABASE \"$DB_NAME\" OWNER TO \"$DB_USER\";"
      args:
        executable: /bin/bash

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Install Maven dependencies and build JAR
      shell: |
        cd "{{ app_dir }}"
        chmod +x mvnw
        JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac)))) ./mvnw package -DskipTests -q
      args:
        executable: /bin/bash

    - name: Find uploaded JAR
      find:
        paths:
          - "{{ app_dir }}/target"
          - "{{ app_dir }}/build/libs"
        patterns: "*.jar"
        recurse: no
      register: jar_search

    - name: Fail if no JAR found
      fail:
        msg: "No JAR file found in target/ or build/libs/"
      when: jar_search.files | length == 0

    - name: Set app_jar fact
      set_fact:
        app_jar: "{{ (jar_search.files | sort(attribute='mtime') | last).path }}"

    - name: Create systemd service for Spring Boot
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} Spring Boot app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/java -jar {{ app_jar }} --server.port={{ app_port }}
          Restart=always
          RestartSec=10
          Environment=SPRING_DATASOURCE_URL=${DATABASE_URL}

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for Spring Boot to start
      wait_for:
        port: 8080
        host: 127.0.0.1
        timeout: 300
        delay: 20
      ignore_errors: yes
      register: port_wait

    - name: Show Spring Boot logs if startup failed
      command: journalctl -u app -n 80 --no-pager
      register: service_logs
      when: port_wait is failed
      changed_when: false

    - name: Fail with logs if Spring Boot did not start
      fail:
        msg: "{{ service_logs.stdout }}"
      when: port_wait is failed

    - name: Reload and start web server
      service:
        name: "{{ web_server if web_server not in ('none', 'skip', 'no', '') else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted