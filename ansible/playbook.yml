---
- name: Deploy springec2rb1
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_port: 8080
    project: 'springec2rb1'
    web_server: 'nginx'
    python_version: '3.11'
    entrypoint: 'app.main:app'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Python runtime ────────────────────────────────────────────────────────
    - name: Install pip and venv (system Python)
      apt:
        name:
          - python3-pip
          - python3-venv
          - python3-dev
        state: present

    - name: Add deadsnakes PPA for non-default Python version
      shell: |
        add-apt-repository -y ppa:deadsnakes/ppa
        apt-get update -qq
      args:
        executable: /bin/bash
      when: python_version not in ('3.10', '3', '')

    - name: Install specific Python version from deadsnakes
      apt:
        name:
          - "python{{ python_version }}"
          - "python{{ python_version }}-venv"
          - "python{{ python_version }}-dev"
        state: present
      when: python_version not in ('3.10', '3', '')

    # ── Local database installation ───────────────────────────────────────────
    - name: Install PostgreSQL server
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: 5432
        host: 127.0.0.1
        timeout: 60

    - name: Create PostgreSQL database and user
      shell: |
        DB_NAME="{{ lookup('env', 'DB_NAME') | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ lookup('env', 'DB_USERNAME') | default('appuser', true) }}"
        DB_PASS="{{ lookup('env', 'DB_PASSWORD') | default('apppass', true) }}"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE DATABASE \"$DB_NAME\";"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"
        sudo -u postgres psql -c "ALTER DATABASE \"$DB_NAME\" OWNER TO \"$DB_USER\";"
      args:
        executable: /bin/bash

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Create Python virtual environment
      shell: |
        PY=$(command -v python{{ python_version }} 2>/dev/null || command -v python3)
        $PY -m venv {{ app_dir }}/venv
      args:
        executable: /bin/bash
        creates: "{{ app_dir }}/venv"

    - name: Install Python dependencies
      shell: |
        {{ app_dir }}/venv/bin/pip install --upgrade pip -q
        {{ app_dir }}/venv/bin/pip install -r {{ app_dir }}/requirements.txt -q
      args:
        executable: /bin/bash

    - name: Create .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        DB_URL="{{ lookup('env', 'DATABASE_URL') }}"
        [ -n "$DB_URL" ] && printf 'DATABASE_URL=%s\n' "$DB_URL" >> {{ app_dir }}/.env || true
        printf 'PORT={{ app_port }}\nAPP_ENV=production\n' >> {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} FastAPI app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/venv/bin/gunicorn {{ entrypoint }} \
            --workers 2 --worker-class uvicorn.workers.UvicornWorker \
            --bind 0.0.0.0:{{ app_port }} --timeout 120
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start web server
      service:
        name: "{{ web_server if web_server not in ('none', 'skip', 'no', '') else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
